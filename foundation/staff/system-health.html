<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School - System Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/components.css" />
  <link rel="stylesheet" href="../ui/layout.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
  <style>
    body { font-family: "Manrope", system-ui, sans-serif; }
    .hero-title { margin: 0; font-size: clamp(1.6rem, 3.2vw, 2.2rem); }
    .hero-sub { margin-top: 6px; }
    .checks { display: grid; gap: 10px; }
    .check { display: flex; justify-content: space-between; gap: 12px; border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; background: var(--surface-2); }
    .check strong { font-size: 13px; }
    .status { font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); }
    .status.ok { background: var(--success-soft); color: #1b6b3d; }
    .status.warn { background: #fff4db; color: #8a5600; }
    .status.bad { background: var(--danger-soft); color: #a33131; }
    .state { padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); color: var(--muted); }
  </style>
</head>
<body>
  <main class="fs-page">
    <section class="hero">
      <h1 class="hero-title">System Health</h1>
      <p class="hero-sub">Runtime checks for Supabase access, queue pressure, and delivery risk.</p>
    </section>

    <section class="card">
      <div class="fs-row" style="margin-bottom:10px;">
        <strong>Health Snapshot</strong>
        <span class="spacer"></span>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>
      <div id="checks" class="checks"></div>
      <div id="checksState" class="state">Running checks...</div>
    </section>

    <section class="card">
      <h3 style="margin-top:0;">Queue Counters</h3>
      <div id="stats" class="stats"></div>
      <div id="statsState" class="state">Loading queue counters...</div>
    </section>

    <section class="card">
      <h3 style="margin-top:0;">Migration Notes</h3>
      <ul id="migrationNotes" class="muted" style="margin:0 0 0 18px;"></ul>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/admin-shell.js"></script>
  <script type="module">
    import { supabase, getCurrentProfile } from "../auth/auth-client.js";

    const roleAllow = new Set(["admin", "superadmin", "subgroup_admin", "pastor"]);
    const missingTables = new Set();
    const $ = (id) => document.getElementById(id);

    const isMissingTable = (error) => {
      const msg = String(error?.message || "").toLowerCase();
      return error?.code === "42P01" || msg.includes("does not exist") || msg.includes("relation");
    };

    function setState(id, msg) {
      $(id).textContent = msg;
      $(id).classList.remove("hidden");
    }

    function clearState(id) {
      $(id).classList.add("hidden");
    }

    function checkRow(name, status, detail) {
      return `
        <article class="check">
          <div>
            <strong>${name}</strong>
            <div class="muted">${detail}</div>
          </div>
          <span class="status ${status}">${status.toUpperCase()}</span>
        </article>
      `;
    }

    async function ensureAccess() {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return null;
      }
      const profile = await getCurrentProfile();
      if (!profile || !roleAllow.has(profile.role)) {
        setState("checksState", "Access denied for this account.");
        return null;
      }
      return profile;
    }

    async function safeCount(table, apply) {
      let query = supabase.from(table).select("*", { count: "exact", head: true });
      if (typeof apply === "function") query = apply(query);
      const { count, error } = await query;
      if (error) {
        if (isMissingTable(error)) {
          missingTables.add(table);
          return 0;
        }
        throw error;
      }
      return count || 0;
    }

    async function healthChecks() {
      setState("checksState", "Running checks...");
      missingTables.clear();
      const rows = [];

      try {
        const probe = await supabase.from("batches").select("batch_id", { head: true, count: "exact" }).limit(1);
        if (probe.error) {
          if (isMissingTable(probe.error)) missingTables.add("batches");
          rows.push(checkRow("Supabase Connection", "bad", probe.error.message));
        } else {
          rows.push(checkRow("Supabase Connection", "ok", "Database reachable via anon session."));
        }
      } catch (error) {
        rows.push(checkRow("Supabase Connection", "bad", error.message));
      }

      const session = await supabase.auth.getSession();
      rows.push(checkRow("Auth Session", session.data?.session ? "ok" : "warn", session.data?.session ? "Active session found." : "No active session detected."));

      try {
        const rlsProbe = await supabase.from("profiles").select("user_id").limit(1);
        if (rlsProbe.error) {
          rows.push(checkRow("RLS Visibility", "warn", rlsProbe.error.message));
        } else {
          rows.push(checkRow("RLS Visibility", "ok", "Read probe succeeded for profiles."));
        }
      } catch (error) {
        rows.push(checkRow("RLS Visibility", "warn", error.message));
      }

      rows.push(checkRow("Edge Function: registration-processor", "warn", "Placeholder check. Add function heartbeat table for live probe."));
      rows.push(checkRow("Edge Function: sender-worker", "warn", "Placeholder check. Add worker heartbeat table for live probe."));

      $("checks").innerHTML = rows.join("");
      clearState("checksState");
    }

    async function loadStats() {
      setState("statsState", "Loading queue counters...");
      const queuedEmails = await safeCount("email_queue", (q) => q.in("status", ["Pending", "pending", "queued", "QUEUED"]));
      const failedSyncs = await safeCount("failed_syncs", (q) => q.in("status", ["failed", "error", "FAILED", "ERROR"]));
      const activeBatches = await safeCount("batches", (q) => q.eq("active", true));

      $("stats").innerHTML = [
        { label: "Queued Emails", value: queuedEmails },
        { label: "Failed Sync Count", value: failedSyncs },
        { label: "Active Batch Count", value: activeBatches },
      ].map((item) => `
        <article class="stat">
          <div class="stat-value">${item.value}</div>
          <div class="stat-label">${item.label}</div>
        </article>
      `).join("");

      clearState("statsState");
    }

    function renderMigrationNotes() {
      const items = [...missingTables].map((t) => `Missing required table for health checks: ${t}`);
      $("migrationNotes").innerHTML = items.length
        ? items.map((i) => `<li>${i}</li>`).join("")
        : "<li>No missing-table migrations detected for this view.</li>";
    }

    async function refresh() {
      await healthChecks();
      await loadStats();
      renderMigrationNotes();
    }

    async function init() {
      const profile = await ensureAccess();
      if (!profile) return;

      window.FSAdminShell?.mount({
        active: "health",
        title: "Foundation School Admin",
        profileName: profile.full_name || profile.email || "Admin",
        role: profile.role,
        breadcrumbs: [{ label: "Admin", href: "admin-dashboard.html" }, "System Health"],
      });

      $("refreshBtn").addEventListener("click", refresh);
      await refresh();
    }

    init();
  </script>
</body>
</html>
