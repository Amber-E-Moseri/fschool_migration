<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School - Dashboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/components.css" />
  <link rel="stylesheet" href="../ui/layout.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
  <style>
    body { font-family: "Manrope", system-ui, sans-serif; }
    .hero-title { margin: 0; font-size: clamp(1.6rem, 3.2vw, 2.2rem); }
    .hero-sub { margin-top: 6px; }
    .stats { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .stat { text-align: left; }
    .stat-value { font-size: 1.8rem; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 780px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; background: var(--surface-2); }
    .state { padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); color: var(--muted); }
  </style>
</head>
<body>
  <main class="fs-page">
    <section class="hero">
      <h1 class="hero-title">Operational Dashboards</h1>
      <p class="hero-sub">Live registration and delivery summary powered by Supabase.</p>
    </section>

    <section class="card">
      <div class="fs-row" style="margin-bottom:10px;">
        <strong>Platform Snapshot</strong>
        <span class="spacer"></span>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>
      <div id="stats" class="stats"></div>
      <div id="statsState" class="state">Loading summary metrics...</div>
    </section>

    <section class="card">
      <h3 style="margin-top:0;">Recent Registrations</h3>
      <div id="recentState" class="state">Loading recent registrations...</div>
      <div id="recentWrap" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Name</th>
              <th>Email</th>
              <th>Fellowship</th>
              <th>Batch</th>
              <th>Status</th>
              <th>Availability</th>
            </tr>
          </thead>
          <tbody id="recentRows"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h3 style="margin-top:0;">Migration Notes</h3>
      <ul id="migrationNotes" class="muted" style="margin:0 0 0 18px;"></ul>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/admin-shell.js"></script>
  <script type="module">
    import { supabase, getCurrentProfile } from "../auth/auth-client.js";

    const $ = (id) => document.getElementById(id);
    const roleAllow = new Set(["admin", "superadmin", "subgroup_admin", "pastor"]);
    const missingTables = new Set();

    function stateMessage(targetId, msg) {
      $(targetId).textContent = msg;
      $(targetId).classList.remove("hidden");
    }

    function hideState(targetId) {
      $(targetId).classList.add("hidden");
    }

    const isMissingTable = (error) => {
      const msg = String(error?.message || "").toLowerCase();
      return error?.code === "42P01" || msg.includes("does not exist") || msg.includes("relation");
    };

    async function safeCount(table, apply) {
      let query = supabase.from(table).select("*", { count: "exact", head: true });
      if (typeof apply === "function") query = apply(query);
      const { count, error } = await query;
      if (error) {
        if (isMissingTable(error)) {
          missingTables.add(table);
          return 0;
        }
        throw error;
      }
      return count || 0;
    }

    async function ensureAccess() {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return null;
      }
      const profile = await getCurrentProfile();
      if (!profile || !roleAllow.has(profile.role)) {
        stateMessage("statsState", "Access denied for this account.");
        return null;
      }
      return profile;
    }

    function renderStats(items) {
      $("stats").innerHTML = items.map((item) => `
        <article class="stat">
          <div class="stat-value">${item.value}</div>
          <div class="stat-label">${item.label}</div>
        </article>
      `).join("");
    }

    async function loadStats() {
      stateMessage("statsState", "Loading summary metrics...");
      missingTables.clear();

      const totalApplicants = await safeCount("applicants");
      const assigned = await safeCount("applicants", (q) => q.eq("registration_status", "ASSIGNED"));
      const waitlisted = await safeCount("applicants", (q) => q.eq("registration_status", "WAITLISTED"));
      const duplicates = await safeCount("applicants", (q) => q.eq("registration_status", "DUPLICATE"));
      const activeBatches = await safeCount("batches", (q) => q.eq("active", true));
      const queuedEmails = await safeCount("email_queue", (q) => q.in("status", ["Pending", "pending", "queued", "QUEUED"]));
      const failedSyncs = await safeCount("failed_syncs", (q) => q.in("status", ["failed", "error", "FAILED", "ERROR"]));

      renderStats([
        { label: "Total Applicants", value: totalApplicants },
        { label: "Assigned", value: assigned },
        { label: "Waitlisted", value: waitlisted },
        { label: "Duplicates", value: duplicates },
        { label: "Active Batches", value: activeBatches },
        { label: "Queued Emails", value: queuedEmails },
        { label: "Failed Syncs", value: failedSyncs },
      ]);

      hideState("statsState");
    }

    function findAny(obj, keys) {
      return keys.map((k) => obj?.[k]).find((v) => v !== undefined && v !== null && v !== "") || "-";
    }

    function fmtTime(value) {
      if (!value) return "-";
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? String(value) : d.toLocaleString();
    }

    async function loadRecent() {
      stateMessage("recentState", "Loading recent registrations...");
      $("recentWrap").classList.add("hidden");

      const { data, error } = await supabase
        .from("applicants")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(20);

      if (error) {
        if (isMissingTable(error)) {
          missingTables.add("applicants");
          stateMessage("recentState", "Missing table: applicants.");
          return;
        }
        stateMessage("recentState", `Could not load recent registrations: ${error.message}`);
        return;
      }

      const rows = (data || []).map((row) => `
        <tr>
          <td>${fmtTime(findAny(row, ["created_at", "submitted_at"]))}</td>
          <td>${findAny(row, ["full_name", "name", "applicant_name"])}</td>
          <td>${findAny(row, ["email", "email_address"])}</td>
          <td>${findAny(row, ["fellowship", "fellowship_name", "group_id"])}</td>
          <td>${findAny(row, ["batch_id", "batch_name"])}</td>
          <td>${findAny(row, ["registration_status", "status"])}</td>
          <td>${findAny(row, ["availability_status", "availability_outcome"])}</td>
        </tr>
      `).join("");

      $("recentRows").innerHTML = rows || `<tr><td colspan="7">No recent registrations found.</td></tr>`;
      hideState("recentState");
      $("recentWrap").classList.remove("hidden");
    }

    function renderMigrationNotes() {
      const notes = $("migrationNotes");
      const items = [...missingTables].map((t) => `Missing required table: ${t}`);
      if (!items.length) {
        notes.innerHTML = "<li>No missing-table migrations detected for this view.</li>";
        return;
      }
      notes.innerHTML = items.map((i) => `<li>${i}</li>`).join("");
    }

    async function refresh() {
      try {
        await loadStats();
        await loadRecent();
      } finally {
        renderMigrationNotes();
      }
    }

    async function init() {
      const profile = await ensureAccess();
      if (!profile) return;

      window.FSAdminShell?.mount({
        active: "dashboard",
        title: "Foundation School Admin",
        profileName: profile.full_name || profile.email || "Admin",
        role: profile.role,
        breadcrumbs: [{ label: "Admin", href: "admin-dashboard.html" }, "Dashboards"],
      });

      $("refreshBtn").addEventListener("click", refresh);
      await refresh();
    }

    init();
  </script>
</body>
</html>
