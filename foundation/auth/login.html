<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid Login</title>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/primitives.css" />
  <style>
    body {
      background: #f5f3ff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1E1630;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid #e9ddff;
      border-radius: 16px;
      padding: 40px;
      box-sizing: border-box;
    }
    .login-card .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #4C2A92;
      margin: 0 0 8px 0;
    }
    .login-subtitle {
      font-size: 14px;
      color: #6f6881;
      margin: 0 0 16px 0;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-input {
      width: 100%;
      box-sizing: border-box;
      background: #ffffff;
      border: 1px solid #e0d9ff;
      border-radius: 8px;
      padding: 12px 14px;
      color: #1E1630;
      outline: none;
    }
    .login-input::placeholder { color: #9c91b7; }
    .login-submit {
      width: 100%;
      background: #4C2A92;
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-submit:disabled { opacity: .7; cursor: not-allowed; }
    .login-msg {
      font-size: 14px;
      color: #6f6881;
      margin: 12px 0 0 0;
      line-height: 1.5;
    }
    .login-msg.error { color: #b42318; }
    .login-msg.success { color: #067647; }
    .hidden { display: none !important; }
    #forgotPasswordBtn {
      appearance: none;
      -webkit-appearance: none;
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      color: #4C2A92 !important;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0 !important;
      margin-top: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      width: auto !important;
      display: inline;
    }
    @media (max-width: 520px) {
      body { padding: 16px; }
      .login-card { padding: 28px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Rock Solid Login</h1>
    <p class="login-subtitle">Sign in to continue.</p>
    <form id="loginForm" class="login-form">
      <input id="email" type="email" required placeholder="Email" class="login-input" />
      <input id="password" type="password" required placeholder="Password" class="login-input" />
      <button type="submit" class="login-submit">Sign In</button>
      <a id="forgotPasswordBtn" href="#">Forgot password?</a>
    </form>
    <p id="msg" class="login-msg"></p>
    <p id="supportMsg" class="login-msg hidden"></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script type="module">
    import { supabase, getCurrentProfile, TEACHER_LANDING_PATH, ADMIN_LANDING_PATH } from "./auth-client.js";

    // If a recovery token is in the hash, this is a reset-password link â€”
    // hand it off immediately before auth-client.js can process it as a login.
    const _hash = window.location.hash || "";
    if (_hash.includes("type=recovery")) {
      window.location.replace("reset-password.html" + _hash);
    }
    // Clear any other stale access_token hash so it isn't misread.
    if (_hash.includes("access_token")) {
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }

    const appPath = (relativePath) => {
      const clean = String(relativePath || "").replace(/^\/+/, "");
      const p = window.location.pathname || "";
      return p.includes("/foundation/") ? `/foundation/${clean}` : `/${clean}`;
    };
    const safeNext = () => {
      const raw = new URLSearchParams(window.location.search).get("next") || "";
      if (!raw.startsWith("/")) return appPath("staff/admin-dashboard.html");
      if (raw.startsWith("//")) return appPath("staff/admin-dashboard.html");
      return raw;
    };

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const submitBtn = form.querySelector('button[type="submit"]');
    const emailInput = document.getElementById("email");
    const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");
    const supportMsg = document.getElementById("supportMsg");
    const supportEmail = String(window.FS_CONFIG?.SUPPORT_EMAIL || "support@rocksolid.school").trim() || "support@rocksolid.school";
    let loginPending = false;
    const withTimeout = async (promise, ms, label) => {
      let timer = null;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(`${label} timed out`)), ms);
      });
      try {
        return await Promise.race([promise, timeout]);
      } finally {
        if (timer) clearTimeout(timer);
      }
    };

    function setSupportLine(show) {
      if (!supportMsg) return;
      supportMsg.textContent = show ? `Contact ${supportEmail} for access.` : "";
      supportMsg.classList.toggle("hidden", !show);
    }

    const errorCode = new URLSearchParams(window.location.search).get("error") || "";
    if (errorCode === "inactive") {
      msg.textContent = "Your teacher account is inactive or not yet linked. Contact your administrator.";
      setSupportLine(true);
    } else if (errorCode === "pending") {
      msg.textContent = "Your account is pending approval.";
      setSupportLine(true);
    } else if (errorCode === "unauthorized") {
      msg.textContent = "Your account does not have access to this page.";
      setSupportLine(false);
    } else {
      setSupportLine(false);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (loginPending) return;
      if (!window.FS_CONFIG?.SUPABASE_URL || !window.FS_CONFIG?.SUPABASE_ANON_KEY) {
        msg.classList.add("error");
        msg.textContent = "Runtime config is missing (SUPABASE_URL/SUPABASE_ANON_KEY).";
        return;
      }
      loginPending = true;
      if (submitBtn) submitBtn.disabled = true;
      if (submitBtn) submitBtn.textContent = "Signing in...";
      msg.textContent = "";
      msg.classList.remove("error", "success");
      setSupportLine(false);

      const email = emailInput.value.trim();
      const password = document.getElementById("password").value;

      const { error } = await withTimeout(
        supabase.auth.signInWithPassword({ email, password }),
        15000,
        "Sign-in request",
      );
      if (error) {
        const raw = String(error.message || "");
        const isInvalidCreds = raw.toLowerCase().includes("invalid login credentials");
        msg.classList.add("error");
        msg.textContent = isInvalidCreds
          ? "Incorrect email or password. Please try again."
          : `Sign in failed: ${raw || "Please try again or contact support."}`;
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        loginPending = false;
        return;
      }

      let profile = null;
      try {
        profile = await withTimeout(getCurrentProfile(), 12000, "Profile lookup");
      } catch (_) {
        msg.textContent = "Sign in failed. Please try again or contact support.";
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        loginPending = false;
        return;
      }
      if (!profile) {
        msg.textContent = "Sign in failed. Please try again or contact support.";
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        loginPending = false;
        return;
      }
      const role = String(profile.role || "").trim().toLowerCase();
      const isInactive = profile?.is_active === false;

      if (isInactive || role === "pending") {
        await supabase.auth.signOut();
        msg.textContent = "Your account is pending approval.";
        setSupportLine(true);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        loginPending = false;
        return;
      }

      // Pure teacher role â†’ always teacher portal
      if (role === "teacher") {
        window.location.href = appPath(TEACHER_LANDING_PATH);
        return;
      }

      // Superadmin / admin â†’ always admin portal, no check needed
      if (role === "superadmin" || role === "admin") {
        window.location.href = safeNext();
        return;
      }

      // Other staff roles: always route to staff/admin portal
      if (["pastor", "principal", "subgroup_admin", "regional_secretary"].includes(role)) {
        const staffLanding = role === "regional_secretary" ? "staff/dashboards.html" : ADMIN_LANDING_PATH;
        window.location.href = appPath(staffLanding);
        return;
      }

      window.location.href = safeNext();
    });

    forgotPasswordBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) {
        msg.textContent = "Enter your email address first.";
        emailInput.focus();
        return;
      }

      msg.textContent = "Sending reset link...";
      setSupportLine(false);
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}${appPath("auth/reset-password.html")}`,
      });
      if (error) {
        msg.textContent = "Could not send reset link. Please try again or contact support.";
        return;
      }
      msg.textContent = "Check your email for a reset link.";
    });
  </script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
